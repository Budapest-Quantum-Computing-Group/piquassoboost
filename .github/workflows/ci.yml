name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cmake gdb libtbb-dev libopenblas-dev liblapacke-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -q numpy scipy scikit-build piquasso pytest

    - name: Build
      env:
        TBB_LIB_DIR: /usr/lib/x86_64-linux-gnu
        TBB_INC_DIR: /usr/include
      run: |
        python setup.py build_ext -q

    - name: Test (with crash diagnostics)
      env:
        OPENBLAS_NUM_THREADS: 1
        OMP_NUM_THREADS: 1
      run: |
        set +e
        pytest unittests/ -x -v --tb=line
        status=$?

        if [ "$status" -ne 0 ]; then
          echo "Pytest failed. Collecting native backtrace for test_dot2..."
          cat > /tmp/repro_dot2.py <<'PY'
            import numpy as np
            from scipy.stats import unitary_group
            import piquassoboost.common.dot_wrapper as dot

            A_numpy = np.ascontiguousarray(unitary_group.rvs(2))
            B_numpy = np.ascontiguousarray(unitary_group.rvs(2))

            _ = dot.dot2(A_numpy, B_numpy)
            print("dot2 completed")
            PY
          gdb -q --batch \
            -ex "set pagination off" \
            -ex "run" \
            -ex "thread apply all bt full" \
            --args python /tmp/repro_dot2.py || true
        fi

        exit "$status"

  build-and-test-linux-sanitizers:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cmake libtbb-dev libopenblas-dev liblapacke-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -q numpy scipy scikit-build piquasso pytest

    - name: Build (ASan/UBSan)
      env:
        CC: gcc
        CXX: g++
        CFLAGS: -O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined
        CXXFLAGS: -O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined
        LDFLAGS: -fsanitize=address,undefined
        TBB_LIB_DIR: /usr/lib/x86_64-linux-gnu
        TBB_INC_DIR: /usr/include
      run: |
        python setup.py build_ext -q

    - name: Test dot regression (ASan/UBSan)
      env:
        ASAN_OPTIONS: detect_leaks=0
      run: |
        pytest unittests/test_dot.py::test_dot2 -x -v --tb=line

  build-and-test-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: '3.13'
        channels: conda-forge

    - name: Install Windows System Dependencies
      shell: pwsh
      run: |
        conda install -c conda-forge cmake tbb-devel openblas lapack -y

        # Resolve the active conda prefix
        $envPath = $env:CONDA_PREFIX
        if (-not $envPath) {
          $condaInfo = conda info --json | ConvertFrom-Json
          $envPath = $condaInfo.active_prefix
        }
        if (-not $envPath) {
          throw "Could not determine active conda environment path"
        }

        # Use forward slashes for CMake compatibility
        $envPath = $envPath.Replace('\', '/')
        $tbbLib = "$envPath/Library/lib"
        $tbbInc = "$envPath/Library/include"

        Write-Host "Environment path: $envPath"
        Write-Host "TBB include path: $tbbInc"
        Write-Host "TBB lib path: $tbbLib"

        if (Test-Path "$tbbInc/tbb/tbb.h") {
          Write-Host "TBB header found at: $tbbInc/tbb/tbb.h"
        } else {
          Write-Host "WARNING: TBB header not found at expected path, searching..."
          $foundTbb = Get-ChildItem -Path "$envPath" -Recurse -Filter "tbb.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($foundTbb) {
            $tbbInc = (Split-Path -Parent $foundTbb.DirectoryName).Replace('\', '/')
            Write-Host "Found TBB header at: $tbbInc"
          }
        }

        "TBB_LIB_DIR=$tbbLib"    | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "TBB_INC_DIR=$tbbInc"    | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "BLAS_LIB_DIR=$tbbLib"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "CONDA_PREFIX=$envPath"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

        $compilerInclude = $tbbInc.Replace('/', '\')
        if ($env:INCLUDE) {
          "INCLUDE=$compilerInclude;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        } else {
          "INCLUDE=$compilerInclude"              | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        }

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -q numpy scipy scikit-build piquasso pytest

    - name: Build
      env:
        TBB_LIB_DIR: ${{ env.TBB_LIB_DIR }}
        TBB_INC_DIR: ${{ env.TBB_INC_DIR }}
        BLAS_LIB_DIR: ${{ env.BLAS_LIB_DIR }}
        CONDA_PREFIX: ${{ env.CONDA_PREFIX }}
      run: |
        python setup.py build_ext -q

    - name: Test
      run: |
        pytest unittests/ -x -v --tb=line

  build-and-test-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install macOS System Dependencies
      run: |
        brew install cmake tbb openblas lapack libomp

    - name: Set environment variables (macOS)
      run: |
        echo "TBB_LIB_DIR=$(brew --prefix tbb)/lib"     >> $GITHUB_ENV
        echo "TBB_INC_DIR=$(brew --prefix tbb)/include"  >> $GITHUB_ENV
        echo "OMP_NUM_THREADS=1"                          >> $GITHUB_ENV
        export OMP_PREFIX=$(brew --prefix libomp)
        echo "OpenMP_C_FLAGS=-Xpreprocessor -fopenmp -I$OMP_PREFIX/include"   >> $GITHUB_ENV
        echo "OpenMP_CXX_FLAGS=-Xpreprocessor -fopenmp -I$OMP_PREFIX/include" >> $GITHUB_ENV
        echo "OpenMP_C_LIB_NAMES=omp"                                          >> $GITHUB_ENV
        echo "OpenMP_CXX_LIB_NAMES=omp"                                        >> $GITHUB_ENV
        echo "OpenMP_omp_LIBRARY=$OMP_PREFIX/lib/libomp.dylib"                 >> $GITHUB_ENV

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -q numpy scipy scikit-build piquasso pytest

    - name: Build
      env:
        TBB_LIB_DIR: ${{ env.TBB_LIB_DIR }}
        TBB_INC_DIR: ${{ env.TBB_INC_DIR }}
      run: |
        python setup.py build_ext -q

    - name: Test
      run: |
        pytest unittests/ -x -v --tb=line
