name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (leave empty to use version from setup.py)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(python3 -c "import re; content=open('setup.py').read(); m=re.search(r\"version=['\\\"]([^'\\\"]+)['\\\"]\" ,content); print(m.group(1))")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

  build-wheels:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          channels: conda-forge

      - name: Set up Python (non-Windows)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake tbb openblas lapack libomp

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda install -c conda-forge cmake tbb-devel openblas lapack -y

          $envPath = $env:CONDA_PREFIX
          if (-not $envPath) {
            $envPath = conda env list | Select-String '\*' | ForEach-Object { ($_ -split '\s+', 3)[1] }
          }
          if (-not $envPath) {
            $envPath = conda info --base
          }
          $envPath = $envPath.Replace('\', '/')
          $tbbLib = "$envPath/Library/lib"
          $tbbInc = "$envPath/Library/include"

          if (-not (Test-Path "$tbbInc/tbb/tbb.h")) {
            $foundTbb = Get-ChildItem -Path "$envPath" -Recurse -Filter "tbb.h" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($foundTbb) {
              $tbbInc = $foundTbb.DirectoryName.Replace('\', '/')
            }
          }

          "TBB_LIB_DIR=$tbbLib"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TBB_INC_DIR=$tbbInc"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BLAS_LIB_DIR=$tbbLib"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CONDA_PREFIX=$envPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set environment variables (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "TBB_LIB_DIR=$(brew --prefix tbb)/lib"     >> $GITHUB_ENV
          echo "TBB_INC_DIR=$(brew --prefix tbb)/include"  >> $GITHUB_ENV
          echo "OMP_NUM_THREADS=1"                          >> $GITHUB_ENV
          export OMP_PREFIX=$(brew --prefix libomp)
          echo "OpenMP_C_FLAGS=-Xpreprocessor -fopenmp -I$OMP_PREFIX/include"   >> $GITHUB_ENV
          echo "OpenMP_CXX_FLAGS=-Xpreprocessor -fopenmp -I$OMP_PREFIX/include" >> $GITHUB_ENV
          echo "OpenMP_C_LIB_NAMES=omp"                                          >> $GITHUB_ENV
          echo "OpenMP_CXX_LIB_NAMES=omp"                                        >> $GITHUB_ENV
          echo "OpenMP_omp_LIBRARY=$OMP_PREFIX/lib/libomp.dylib"                 >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools wheel scikit-build ninja numpy

      - name: Install wheel repair tools (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install delocate

      - name: Install wheel repair tools (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install delvewheel

      - name: Build wheel
        env:
          TBB_LIB_DIR: ${{ env.TBB_LIB_DIR }}
          TBB_INC_DIR: ${{ env.TBB_INC_DIR }}
          BLAS_LIB_DIR: ${{ env.BLAS_LIB_DIR }}
          CONDA_PREFIX: ${{ env.CONDA_PREFIX }}
        run: |
          python -m build --wheel

      - name: Repair wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          for wheel in dist/*.whl; do
            delocate-wheel -w dist/repaired/ "$wheel"
          done
          rm dist/*.whl
          mv dist/repaired/*.whl dist/

      - name: Repair wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          if (-not $wheel) { Write-Host "ERROR: No wheel found"; exit 1 }
          Write-Host "Repairing wheel: $($wheel.Name)"

          # delvewheel needs to discover piquassoboost.dll and its runtime
          # dependencies (openblas.dll, tbb12.dll, tbbmalloc.dll).
          # * piquassoboost.dll is written to the source tree during the cmake
          #   build (RUNTIME_OUTPUT_DIRECTORY = PROJECT_SOURCE_DIR/piquassoboost)
          # * openblas/tbb DLLs live in the conda Library/bin directory.
          # Windows DLL search does NOT traverse parent directories, so we
          # must supply both paths explicitly via --add-path.
          $pqbSrc  = Join-Path (Get-Location) 'piquassoboost'
          $condaBin = "$env:CONDA_PREFIX\Library\bin"
          $addPath = "$pqbSrc;$condaBin"
          Write-Host "delvewheel add-path: $addPath"
          delvewheel repair --add-path $addPath $wheel.FullName -w dist/
          Write-Host "Repair complete. Wheels in dist/:"
          Get-ChildItem dist/*.whl | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 1

  build-manylinux-wheels:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        image: [manylinux_2_28_x86_64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheel
        run: |
          docker run --rm -v ${{ github.workspace }}:/io \
            quay.io/pypa/${{ matrix.image }} \
            /bin/bash -c "
              yum install -y cmake tbb-devel openblas-devel lapack-devel
              PYTHON_TAG=\$(echo '${{ matrix.python-version }}' | tr -d '.')
              /opt/python/cp\${PYTHON_TAG}-cp\${PYTHON_TAG}/bin/pip install --upgrade pip
              /opt/python/cp\${PYTHON_TAG}-cp\${PYTHON_TAG}/bin/pip install build setuptools wheel scikit-build ninja numpy auditwheel

              TBB_LIB_PATH=\$(find /usr -name 'libtbb.so*' 2>/dev/null | head -1 | xargs dirname)
              TBB_INC_PATH=\$(find /usr -name 'tbb.h' 2>/dev/null | head -1 | xargs dirname)
              [ -z \"\${TBB_LIB_PATH}\" ] && TBB_LIB_PATH=/usr/lib64
              [ -z \"\${TBB_INC_PATH}\" ] && TBB_INC_PATH=/usr/include

              export TBB_LIB_DIR=\${TBB_LIB_PATH}
              export TBB_INC_DIR=\${TBB_INC_PATH}

              cd /io
              /opt/python/cp\${PYTHON_TAG}-cp\${PYTHON_TAG}/bin/python -m build --wheel
              /opt/python/cp\${PYTHON_TAG}-cp\${PYTHON_TAG}/bin/auditwheel repair dist/*.whl -w dist/
              rm -f dist/*linux_x86_64.whl
            "

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux-${{ matrix.image }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 1

  publish:
    needs: [get-version, build-wheels, build-manylinux-wheels]
    runs-on: ubuntu-latest
    # Only publish to PyPI on an actual GitHub release event, not on
    # workflow_dispatch (which is used for testing the build without releasing).
    if: github.event_name == 'release' && needs.get-version.outputs.version != ''
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Display wheel files
        run: ls -lh dist/*.whl || echo "No wheels found"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
