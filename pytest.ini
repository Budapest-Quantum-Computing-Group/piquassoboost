[pytest]
# test_generate_subgraphs_from_adjacency_matrix: lives in networkx extras, not
# installed in the standard test environment.
# test_counts_raises[PureFockSimulator-HomodyneMeasurement]: piquasso v7.2.1 bug
# on Python 3.13 — PureFockSimulator + HomodyneMeasurement raises InvalidState
# before get_counts() is reachable; unrelated to piquassoboost.
# test_copyrights: upstream piquasso-module test scans the whole superproject,
# including submodule docs and generated build artifacts; those files are not
# owned by piquassoboost and can fail independently of this repository.
# Upstream seeding tests (test_ThresholdMeasurement_use_torontonian_seeding,
# test_boson_sampling_seeded, etc.): piquasso's expected values were generated
# with numpy's SeedSequence RNG; the boosted path uses C++ mt19937 draws which
# produce a different (but reproducible) sequence. Boosted-correct versions live in
# unittests/test_seeding.py.
addopts = --deselect=tests/_simulators/sampling/test_measurements.py::test_boson_sampling_seeded --deselect=tests/_simulators/sampling/test_measurements.py::test_LossyInterferometer_boson_sampling_seeded --deselect=tests/_simulators/sampling/test_measurements.py::test_LossyInterferometer_boson_sampling_uniform_losses --deselect=tests/_simulators/gaussian/test_measurements.py::test_ThresholdMeasurement_use_torontonian_seeding --deselect=tests/_simulators/gaussian/test_measurements.py::test_ThresholdMeasurement_use_torontonian_seeding_float32 -k "not test_generate_subgraphs_from_adjacency_matrix and not (test_counts_raises and HomodyneMeasurement) and not test_copyrights"
testpaths = tests unittests


markers =
    monkey: marks tests with stochastic inputs.

python_functions = test_* *_benchmark *_script
python_files = test_*.py *_benchmark.py *_script.py
